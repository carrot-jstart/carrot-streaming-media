name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  # ─── Build binaries for all platforms ──────────────────────────────────────
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - name: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o "dist/carrot-server${{ matrix.ext }}" ./cmd/server

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          cd dist
          zip -r "../carrot-streaming-media-${{ matrix.name }}.zip" \
            carrot-server.exe ../web ../carrot.conf ../README.md

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist
          tar czf "../carrot-streaming-media-${{ matrix.name }}.tar.gz" \
            carrot-server ../web ../carrot.conf ../README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: carrot-streaming-media-${{ matrix.name }}
          path: carrot-streaming-media-${{ matrix.name }}.*

  # ─── Docker build & push ──────────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    # Only build Docker on main branch pushes and tags (skip PRs)
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64, linux/arm64

  # ─── GitHub Release ───────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
