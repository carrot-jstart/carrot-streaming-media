# ============================================
# Carrot Streaming Media Server Configuration
# ============================================

# SSL 证书（相对路径，相对于工作目录）
ssl_certificate=./localhost+3.pem
ssl_certificate_key=./localhost+3-key.pem

# HTTP 端口（HTTPS/WSS 播放页面）
http_port=7777

# RTMP 端口（ffmpeg 推流）
rtmp_port=1935

# Web 静态文件目录
web_dir=./web

# 日志级别: debug, info, warn, error
log_level=info
